# ESS-0000757 Standard Property Names
# Tables 6-10 from the naming convention document
# Used for informational validation (suggestions, not errors)

quantities:
  # Table 6: Physical quantities (ISO/IEC 80000)
  - {full: "Current", abbrev: "Curr", unit: "A", category: "physical"}
  - {full: "Charge", abbrev: "Char", unit: "C", category: "physical"}
  - {full: "Voltage", abbrev: "Volt", unit: "V", category: "physical"}
  - {full: "Resistance", abbrev: "Resi", unit: "Ohm", category: "physical"}
  - {full: "Capacitance", abbrev: "Capa", unit: "F", category: "physical"}
  - {full: "Pressure", abbrev: "Pres", unit: "Pa", category: "physical"}
  - {full: "Temperature", abbrev: "Temp", unit: "C", category: "physical"}
  - {full: "Length", abbrev: "Leng", unit: "m", category: "physical"}
  - {full: "Mass", abbrev: "Mass", unit: "kg", category: "physical"}
  - {full: "Time", abbrev: "Time", unit: "s", category: "physical"}
  - {full: "Acceleration", abbrev: "Acce", unit: "m/s2", category: "physical"}
  - {full: "Power", abbrev: "Pwr", unit: "W", category: "physical"}
  - {full: "Energy", abbrev: "Ener", unit: "J", category: "physical"}
  - {full: "Frequency", abbrev: "Freq", unit: "Hz", category: "physical"}
  - {full: "Volume", abbrev: "Volu", unit: "m3", category: "physical"}
  - {full: "Velocity", abbrev: "Velo", unit: "m/s", category: "physical"}
  - {full: "Area", abbrev: "Area", unit: "m2", category: "physical"}
  - {full: "Force", abbrev: "Forc", unit: "N", category: "physical"}
  - {full: "Inductance", abbrev: "Indu", unit: "H", category: "physical"}
  - {full: "Activity", abbrev: "Acti", unit: "Bq", category: "physical"}
  - {full: "Density", abbrev: "Dens", unit: "kg/m3", category: "physical"}
  - {full: "Conductivity", abbrev: null, unit: "S/m", category: "physical"}
  - {full: "MagneticFlux", abbrev: "MagnFlux", unit: "Wb", category: "physical"}
  - {full: "MagneticFluxDensity", abbrev: "MagnFluxDens", unit: "T", category: "physical"}
  - {full: "LuminousFlux", abbrev: "LumiFlux", unit: "lm", category: "physical"}
  - {full: "PlaneAngle", abbrev: "PlanAng", unit: "rad", category: "physical"}
  - {full: "SolidAngle", abbrev: "SoliAng", unit: "sr", category: "physical"}
  - {full: "AbsorbedDose", abbrev: "AbsoDose", unit: "Gy", category: "physical"}
  - {full: "DoseEquivalent", abbrev: "DoseEqui", unit: "Sv", category: "physical"}
