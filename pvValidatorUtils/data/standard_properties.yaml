  - {full: "StorageSize", abbrev: "StorSize", unit: "B", category: "info"}
  - {full: "TrafficIntensity", abbrev: "TraffInt", unit: "E", category: "info"}
  - {full: "TransferRate", abbrev: "TrasfRate", unit: "B/s", category: "info"}
  - {full: "ModulationRate", abbrev: "ModuRate", unit: "Bd", category: "info"}
  - {full: "ClockRate", abbrev: "ClockRate", unit: "Hz", category: "info"}
  - {full: "CarrierPower", abbrev: "CarrPowe", unit: "W", category: "info"}
  - {full: "Entropy", abbrev: "Entro", unit: "Sh", category: "info"}

actions:
  # Table 8: Action properties
  - {name: "Start", description: "Initiate operation"}
  - {name: "Stop", description: "Cease operation"}
  - {name: "Open", alternatives: ["C_Open"], description: "Open two-state device"}
  - {name: "Close", alternatives: ["C_Close"], description: "Close two-state device"}
  - {name: "Set", description: "Apply configuration"}
  - {name: "Get", description: "Retrieve configuration"}
  - {name: "Reset", description: "Restore to default"}
  - {name: "Enable", alternatives: ["C_Enable", "Enbl"], description: "Allow operability"}
  - {name: "Disable", alternatives: ["C_Disable", "Disbl"], description: "Disallow operability"}
  - {name: "Inhibit", description: "Cease temporarily"}
  - {name: "Hold", description: "Retain state"}
  - {name: "Release", description: "Remove hold"}
  - {name: "C_Force", description: "Override value"}
  - {name: "Lock", description: "Prevent operation"}
  - {name: "Scale", description: "Convert units"}
  - {name: "Ack", description: "Acknowledge event"}
  - {name: "Trigger", description: "Initiate event-based action"}
  - {name: "Press", description: "Actuate physical device"}
  - {name: "Scan", description: "Detect/read physical device"}
  - {name: "Search", description: "Search physical areas"}

states:
  # Table 9: State properties
  - {name: "Opened", description: "Position feedback open"}
  - {name: "Closed", description: "Position feedback closed"}
  - {name: "On", description: "Power on"}
  - {name: "Off", description: "Power off"}
  - {name: "Error", description: "Abnormal condition"}
  - {name: "Failure", description: "Abnormal condition"}
  - {name: "Fault", description: "Abnormal condition"}
  - {name: "Tripped", description: "Breaker tripped"}
  - {name: "High", description: "High limit reached"}
  - {name: "Low", description: "Low limit reached"}
  - {name: "Auto", description: "Automatic mode"}
  - {name: "Manual", description: "Manual mode"}
  - {name: "Local", description: "Local control"}
  - {name: "Remote", description: "Remote control"}
  - {name: "Forced", description: "Forced mode"}
  - {name: "Locked", description: "Locked mode"}
  - {name: "Indexed", description: "Position locked"}
  - {name: "Connected", description: "Communication link active"}
  - {name: "Enabled", description: "Operability active"}
  - {name: "Disabled", description: "Operability inactive"}
  - {name: "Ready", description: "Ready to operate"}
  - {name: "Configured", description: "Configuration applied"}
  - {name: "Requested", description: "Configuration requested"}
  - {name: "Pressed", description: "Physical device actuated"}
  - {name: "Searched", description: "Area search state"}
  - {name: "In", description: "Position in"}
  - {name: "Out", description: "Position out"}
  - {name: "Ok", description: "Healthy status"}
  - {name: "NotOk", alternatives: ["NOK"], description: "Abnormal status"}
  - {name: "Transitioning", description: "Between states"}

prefixes:
  # Table 10: Property prefixes
  - {prefix: "Ch{n}-", description: "Channel n (0-9)"}
  - {prefix: "Clk-", description: "Clock parameters"}
  - {prefix: "C_", description: "Command/Action disambiguation"}
